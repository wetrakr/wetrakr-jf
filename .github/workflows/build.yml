name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write   # needed to publish releases and push to gh-pages

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 8 + .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Derive version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"                                   # e.g. v0.1.0
          VER="${TAG#v}"                                             # 0.1.0
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "assembly=${VER}.0" >> "$GITHUB_OUTPUT"

      - name: Install JPRM
        run: pip install jprm

      # ---- Dual-build: one ZIP per Jellyfin ABI ----
      #
      # We publish TWO artifacts per release sharing the same plugin version:
      #   - LTS    → net8.0 / Jellyfin.Controller 10.10.7 / targetAbi 10.10.7.0
      #   - Stable → net9.0 / Jellyfin.Controller 10.11.8 / targetAbi 10.11.8.0
      #
      # Jellyfin filters the manifest by targetAbi ≤ server version, so each
      # user only ever sees the entry compatible with their server. Source
      # code is identical between the two binaries — namespace differences
      # are handled via `#if NET8_0` conditionals in the .cs files.

      - name: Build LTS variant (net8.0 / Jellyfin 10.10.x)
        run: |
          cp build.lts.yaml build.yaml
          sed -i "s|^version:.*|version: \"${{ steps.ver.outputs.assembly }}\"|" build.yaml
          mkdir -p artifacts-lts
          jprm --verbosity=debug plugin build . \
            --output=./artifacts-lts \
            --dotnet-configuration=Release \
            --dotnet-framework=net8.0 \
            --version=${{ steps.ver.outputs.assembly }}
          ORIG=$(ls artifacts-lts/*.zip | head -1)
          NEW="artifacts-lts/$(basename "$ORIG" .zip)_net8.zip"
          mv "$ORIG" "$NEW"
          echo "LTS_ZIP=${NEW}" >> "$GITHUB_ENV"

      - name: Build Stable variant (net9.0 / Jellyfin 10.11.x)
        run: |
          cp build.stable.yaml build.yaml
          sed -i "s|^version:.*|version: \"${{ steps.ver.outputs.assembly }}\"|" build.yaml
          mkdir -p artifacts-stable
          jprm --verbosity=debug plugin build . \
            --output=./artifacts-stable \
            --dotnet-configuration=Release \
            --dotnet-framework=net9.0 \
            --version=${{ steps.ver.outputs.assembly }}
          ORIG=$(ls artifacts-stable/*.zip | head -1)
          NEW="artifacts-stable/$(basename "$ORIG" .zip)_net9.zip"
          mv "$ORIG" "$NEW"
          echo "STABLE_ZIP=${NEW}" >> "$GITHUB_ENV"

      - name: Upload both ZIPs to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.LTS_ZIP }}
            ${{ env.STABLE_ZIP }}
          generate_release_notes: true

      # ---- Publish / update split manifests on gh-pages ----
      #
      # We publish TWO independent Jellyfin plugin repositories so that
      # each user sees ONLY the entries compatible with their server line:
      #
      #   gh-pages/manifest.json        -> Stable only (Jellyfin 10.11+)
      #   gh-pages/lts/manifest.json    -> LTS only    (Jellyfin 10.10.x)
      #
      # Jellyfin's manifest filter is `targetAbi <= server.version` (no
      # upper bound), so a single merged manifest would always show LTS
      # entries to 10.11+ users as duplicate "older versions". Splitting
      # the URLs is the only way to deliver a clean revision history per
      # server line.

      - name: Update gh-pages manifests (Stable + LTS)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if git ls-remote --exit-code --heads "$REPO_URL" gh-pages >/dev/null 2>&1; then
            git clone --branch gh-pages "$REPO_URL" gh-pages
          else
            mkdir gh-pages
            ( cd gh-pages && git init -b gh-pages && git remote add origin "$REPO_URL" )
          fi

          # Bootstrap root manifest if missing.
          if [ ! -f gh-pages/manifest.json ]; then
            ( cd gh-pages && jprm repo init . )
            [ -f gh-pages/README.md ] || echo 'WeTrakr Jellyfin plugin repository — https://wetrakr.com' > gh-pages/README.md
          fi

          # One-shot migration: on first run with split manifests, seed
          # lts/manifest.json from any LTS-targetAbi entries currently in
          # root, then strip those entries from root. Subsequent runs are
          # no-ops because root no longer contains LTS entries.
          mkdir -p gh-pages/lts
          if [ ! -f gh-pages/lts/manifest.json ]; then
            jq 'map(.versions = (.versions | map(select(.targetAbi | startswith("10.10.")))))' \
              gh-pages/manifest.json > gh-pages/lts/manifest.json
          fi
          jq 'map(.versions = (.versions | map(select((.targetAbi // "") | startswith("10.10.") | not))))' \
            gh-pages/manifest.json > gh-pages/manifest.tmp.json
          mv gh-pages/manifest.tmp.json gh-pages/manifest.json

          OWNER=${GITHUB_REPOSITORY%%/*}
          NAME=${GITHUB_REPOSITORY##*/}
          SOURCE_URL="https://${OWNER}.github.io/${NAME}"

          VERSION="${{ steps.ver.outputs.assembly }}"
          mkdir -p gh-pages/wetrakr

          # Copy both ZIPs with framework-suffixed filenames so they
          # coexist under wetrakr/ (shared by both manifests).
          LTS_DEST="gh-pages/wetrakr/wetrakr_${VERSION}_net8.zip"
          STABLE_DEST="gh-pages/wetrakr/wetrakr_${VERSION}_net9.zip"
          cp "${{ env.LTS_ZIP }}" "$LTS_DEST"
          cp "${{ env.STABLE_ZIP }}" "$STABLE_DEST"

          LTS_SUM=$(md5sum "$LTS_DEST" | awk '{print $1}')
          STABLE_SUM=$(md5sum "$STABLE_DEST" | awk '{print $1}')
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          RELEASES_URL="https://github.com/${GITHUB_REPOSITORY}/releases"

          LTS_ENTRY=$(jq -nc \
            --arg version "$VERSION" \
            --arg changelog "See ${RELEASES_URL}" \
            --arg sourceUrl "${SOURCE_URL}/wetrakr/wetrakr_${VERSION}_net8.zip" \
            --arg checksum "$LTS_SUM" \
            --arg timestamp "$TS" \
            '{version:$version, changelog:$changelog, targetAbi:"10.10.7.0", sourceUrl:$sourceUrl, checksum:$checksum, timestamp:$timestamp}')

          STABLE_ENTRY=$(jq -nc \
            --arg version "$VERSION" \
            --arg changelog "See ${RELEASES_URL}" \
            --arg sourceUrl "${SOURCE_URL}/wetrakr/wetrakr_${VERSION}_net9.zip" \
            --arg checksum "$STABLE_SUM" \
            --arg timestamp "$TS" \
            '{version:$version, changelog:$changelog, targetAbi:"10.11.8.0", sourceUrl:$sourceUrl, checksum:$checksum, timestamp:$timestamp}')

          # Prepend each entry to its manifest and dedupe by version so
          # retries of the same tag are idempotent.
          jq --argjson e "$STABLE_ENTRY" \
            '.[0].versions = ([$e] + (.[0].versions | map(select(.version != $e.version))))' \
            gh-pages/manifest.json > gh-pages/manifest.tmp.json
          mv gh-pages/manifest.tmp.json gh-pages/manifest.json

          jq --argjson e "$LTS_ENTRY" \
            '.[0].versions = ([$e] + (.[0].versions | map(select(.version != $e.version))))' \
            gh-pages/lts/manifest.json > gh-pages/lts/manifest.tmp.json
          mv gh-pages/lts/manifest.tmp.json gh-pages/lts/manifest.json

          cd gh-pages
          git config user.name github-actions
          git config user.email actions@github.com
          git add -A
          git commit -m "release: ${{ steps.ver.outputs.assembly }} (LTS + Stable)" || { echo "nothing to commit"; exit 0; }
          git push origin gh-pages
