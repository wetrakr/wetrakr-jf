name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write   # needed to publish releases and push to gh-pages

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Derive version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"                                   # e.g. v0.1.0
          VER="${TAG#v}"                                             # 0.1.0
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "assembly=${VER}.0" >> "$GITHUB_OUTPUT"

      - name: Update version in build.yaml
        run: |
          sed -i "s|^version:.*|version: \"${{ steps.ver.outputs.assembly }}\"|" build.yaml

      - name: Build
        run: |
          dotnet publish Jellyfin.Plugin.WeTrakr/Jellyfin.Plugin.WeTrakr.csproj \
            -c Release \
            -f net8.0 \
            -o ./publish \
            -p:Version=${{ steps.ver.outputs.assembly }} \
            -p:AssemblyVersion=${{ steps.ver.outputs.assembly }} \
            -p:FileVersion=${{ steps.ver.outputs.assembly }}

      - name: Install JPRM
        run: pip install jprm

      - name: Package plugin (.zip)
        id: pkg
        run: |
          mkdir -p artifacts
          jprm --verbosity=debug plugin build . \
            --output=./artifacts \
            --dotnet-configuration=Release \
            --dotnet-framework=net8.0 \
            --version=${{ steps.ver.outputs.assembly }}
          ZIP=$(ls artifacts/*.zip | head -1)
          echo "zip=${ZIP}" >> "$GITHUB_OUTPUT"
          echo "basename=$(basename "$ZIP")" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.pkg.outputs.zip }}
          generate_release_notes: true

      # ---- Publish / update manifest.json on gh-pages ----

      - name: Update gh-pages manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          # Try to clone the existing gh-pages branch. If it doesn't exist, bootstrap one.
          if git ls-remote --exit-code --heads "$REPO_URL" gh-pages >/dev/null 2>&1; then
            git clone --branch gh-pages "$REPO_URL" gh-pages
          else
            mkdir gh-pages
            cd gh-pages
            git init -b gh-pages
            git remote add origin "$REPO_URL"
            cd ..
          fi

          # manifest.json may not exist (fresh branch OR previously wiped).
          # jprm repo init is idempotent-safe: re-running on a dir that
          # already has a manifest would clobber it, so only init when missing.
          if [ ! -f gh-pages/manifest.json ]; then
            ( cd gh-pages && jprm repo init . )
            [ -f gh-pages/README.md ] || echo 'WeTrakr Jellyfin plugin repository — https://wetrakr.com' > gh-pages/README.md
          fi

          # Manifest URLs are built as SOURCE_URL/<plugin_slug>/<zip>.
          # gh-pages is served at https://<owner>.github.io/<repo>/ so point
          # there — jprm also copies the zip into gh-pages/<slug>/ so the
          # download works from Pages directly. GitHub Releases still carries
          # a copy for direct download.
          OWNER=${GITHUB_REPOSITORY%%/*}
          NAME=${GITHUB_REPOSITORY##*/}
          SOURCE_URL="https://${OWNER}.github.io/${NAME}"
          jprm repo add --url="$SOURCE_URL" gh-pages "${{ steps.pkg.outputs.zip }}"

          cd gh-pages
          git config user.name github-actions
          git config user.email actions@github.com
          git add -A
          git commit -m "release: ${{ steps.ver.outputs.assembly }}" || { echo "nothing to commit"; exit 0; }
          git push origin gh-pages
